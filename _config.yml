baseurl: ""
markdown: kramdown
permalink: pretty
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: "dexes"
    values:
      layout: "report"
      category: "DEXes"
  - scope:
      path: "ethereum"
    values:
      layout: "report"
      category: "Ethereum"
  - scope:
      path: "lending"
    values:
      layout: "report"
      category: "Lending"
  - scope:
      path: "defi"
    values:
      layout: "report"
      category: "DeFi"
  - scope:
      path: "tradfi"
    values:
      layout: "report"
      category: "TradFi"
