title: Ethereum Reports
description: Research reports on DEXes, DeFi, lending markets, Ethereum, privacy, TradFi, the media ecosystem, and musings
url: https://ethreportseth.xyz
baseurl: ""
markdown: kramdown
permalink: pretty
exclude:
  - "media-ecosystem/debate-archive"
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: "dexes"
    values:
      layout: "report"
      category: "DEXes"
  - scope:
      path: "ethereum"
    values:
      layout: "report"
      category: "Ethereum"
  - scope:
      path: "lending"
    values:
      layout: "report"
      category: "Lending"
  - scope:
      path: "defi"
    values:
      layout: "report"
      category: "DeFi"
  - scope:
      path: "tradfi"
    values:
      layout: "report"
      category: "TradFi"
  - scope:
      path: "privacy"
    values:
      layout: "report"
      category: "Privacy"
  - scope:
      path: "media-ecosystem"
    values:
      layout: "report"
      category: "Media Ecosystem"
  - scope:
      path: "musings"
    values:
      layout: "report"
      category: "Musings"
