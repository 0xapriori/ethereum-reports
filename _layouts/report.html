<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} — {{ site.title }}</title>
  <meta name="description" content="{{ page.title }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="{{ '/' | relative_url }}" class="site-title">ethereum-reports</a>
      <button class="burger" aria-label="Toggle navigation" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="nav" id="nav">
        <a href="#" data-tab="all">All</a>
        <a href="#" data-tab="defi">DeFi</a>
        <a href="#" data-tab="dexes">DEXes</a>
        <a href="#" data-tab="ethereum">Ethereum</a>
        <a href="#" data-tab="lending">Lending</a>
        <a href="#" data-tab="tradfi">TradFi</a>
      </nav>
    </div>
  </header>

  <main>
    <article>
      <div class="report-meta">
        <a href="{{ '/' | relative_url }}" class="back">← Index</a>
        {% if page.category %}<span class="category">{{ page.category }}</span>{% endif %}
      </div>
      {{ content }}
    </article>
  </main>

  <footer>
    <p>0xapriori</p>
  </footer>

  <script>
    (function() {
      var burger = document.querySelector('.burger');
      var nav = document.getElementById('nav');
      burger.addEventListener('click', function() {
        var open = nav.classList.toggle('open');
        burger.classList.toggle('active');
        burger.setAttribute('aria-expanded', open);
      });
      function filterReports(filter) {
        var items = document.querySelectorAll('#report-list li');
        if (!items.length) return false;
        items.forEach(function(li) {
          li.style.display = (filter === 'all' || li.dataset.category === filter) ? '' : 'none';
        });
        nav.querySelectorAll('a[data-tab]').forEach(function(l) {
          l.classList.toggle('active', l.dataset.tab === filter);
        });
        if (filter !== 'all') {
          history.replaceState(null, '', '#' + filter);
        } else {
          history.replaceState(null, '', window.location.pathname);
        }
        return true;
      }

      nav.querySelectorAll('a[data-tab]').forEach(function(a) {
        a.addEventListener('click', function(e) {
          e.preventDefault();
          nav.classList.remove('open');
          burger.classList.remove('active');
          burger.setAttribute('aria-expanded', 'false');
          var tab = a.dataset.tab;
          if (!filterReports(tab)) {
            window.location.href = '/' + (tab === 'all' ? '' : '#' + tab);
          }
        });
      });

      var hash = window.location.hash.replace('#', '');
      if (hash && ['defi','dexes','ethereum','lending','tradfi'].indexOf(hash) !== -1) {
        filterReports(hash);
      }
    })();
  </script>
</body>
</html>
