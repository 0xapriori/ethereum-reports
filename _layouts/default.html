<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="{{ '/' | relative_url }}" class="site-title">ethereum-reports</a>
      <button class="burger" aria-label="Toggle navigation" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="nav" id="nav">
        <a href="{{ '/' | relative_url }}" data-tab="all">All</a>
        <a href="{{ '/' | relative_url }}" data-tab="defi">DeFi</a>
        <a href="{{ '/' | relative_url }}" data-tab="dexes">DEXes</a>
        <a href="{{ '/' | relative_url }}" data-tab="ethereum">Ethereum</a>
        <a href="{{ '/' | relative_url }}" data-tab="lending">Lending</a>
        <a href="{{ '/' | relative_url }}" data-tab="tradfi">TradFi</a>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <p>0xapriori</p>
  </footer>

  <script>
    (function() {
      var burger = document.querySelector('.burger');
      var nav = document.getElementById('nav');
      burger.addEventListener('click', function() {
        var open = nav.classList.toggle('open');
        burger.classList.toggle('active');
        burger.setAttribute('aria-expanded', open);
      });
      nav.querySelectorAll('a').forEach(function(a) {
        a.addEventListener('click', function(e) {
          nav.classList.remove('open');
          burger.classList.remove('active');
          burger.setAttribute('aria-expanded', 'false');
          var tab = a.dataset.tab;
          if (!tab) return;
          var isHome = window.location.pathname === '/' || window.location.pathname === '/index.html';
          if (isHome) {
            e.preventDefault();
            // Filter the report list
            var items = document.querySelectorAll('#report-list li');
            items.forEach(function(li) {
              li.style.display = (tab === 'all' || li.dataset.category === tab) ? '' : 'none';
            });
            nav.querySelectorAll('a[data-tab]').forEach(function(l) {
              l.classList.toggle('active', l.dataset.tab === tab);
            });
            if (tab !== 'all') {
              history.replaceState(null, '', '#' + tab);
            } else {
              history.replaceState(null, '', window.location.pathname);
            }
          } else {
            e.preventDefault();
            window.location.href = '/' + (tab === 'all' ? '' : '#' + tab);
          }
        });
      });
      // On page load, apply hash filter
      var hash = window.location.hash.replace('#', '');
      if (hash && ['defi','dexes','ethereum','lending','tradfi'].indexOf(hash) !== -1) {
        var items = document.querySelectorAll('#report-list li');
        items.forEach(function(li) {
          li.style.display = (li.dataset.category === hash) ? '' : 'none';
        });
        nav.querySelectorAll('a[data-tab]').forEach(function(l) {
          l.classList.toggle('active', l.dataset.tab === hash);
        });
      }
    })();
  </script>
</body>
</html>
